<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlackWorkInc Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); }
        .card-container { height: calc(100vh - 200px); }
        .swipe-card { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s; }
        .tinder-swipe-right { transform: translate(150%, 20px) rotate(30deg) !important; opacity: 0; }
        .tinder-swipe-left { transform: translate(-150%, 20px) rotate(-30deg) !important; opacity: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const DUMMY_JOBS = [
            { id: 3, title: 'Грузчик на склад', salary: '3000 ₽ / смена', icon: '📦', dist: '1.2 км', employer: 'Ozon' },
            { id: 2, title: 'Разнорабочий', salary: '2500 ₽ / смена', icon: '🧱', dist: '3.5 км', employer: 'ООО СтройТрест' },
            { id: 1, title: 'Помощник повара', salary: '3500 ₽ / смена', icon: '🍲', dist: '0.8 км', employer: 'Вкусвилл' },
        ];

        function App() {
            const [jobs, setJobs] = useState(DUMMY_JOBS);
            const [swipeClass, setSwipeClass] = useState('');

            const handleSwipe = (dir) => {
                setSwipeClass(dir === 'right' ? 'tinder-swipe-right' : 'tinder-swipe-left');
                setTimeout(() => {
                    setJobs(prev => prev.slice(0, -1));
                    setSwipeClass('');
                }, 300);
            };

            return React.createElement('div', { className: "flex flex-col h-screen w-full max-w-md mx-auto relative" },
                // Header
                React.createElement('header', { className: "glass z-20 px-6 py-4 pt-10 flex justify-between items-center rounded-b-3xl" },
                    React.createElement('div', { className: "w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-500" }, '👤'),
                    React.createElement('h1', { className: "text-lg font-extrabold text-gray-800" }, "BlackWorkInc"),
                    React.createElement('div', { className: "text-2xl" }, '💬')
                ),
                
                // Card Area
                React.createElement('div', { className: "flex-1 relative flex items-center justify-center p-6" },
                    jobs.length === 0 ? 
                    React.createElement('div', { className: "text-center text-gray-400" }, 
                        React.createElement('div', { className: "text-6xl mb-4" }, '👷'),
                        React.createElement('p', { className: "text-lg font-semibold" }, "Вакансии закончились")
                    ) :
                    jobs.map((job, index) => {
                        const isTop = index === jobs.length - 1;
                        return React.createElement('div', { 
                            key: job.id,
                            className: `absolute w-full aspect-[4/5] glass rounded-[2.5rem] p-8 flex flex-col items-center justify-center transition-all duration-300 ${isTop ? swipeClass : 'scale-95 translate-y-4 opacity-50'}`
                        },
                            React.createElement('div', { className: "text-9xl mb-6 scale-110" }, job.icon),
                            React.createElement('h2', { className: "text-2xl font-black text-gray-800 text-center" }, job.title),
                            React.createElement('div', { className: "mt-4 px-5 py-2 bg-emerald-100 text-emerald-700 rounded-2xl font-bold text-xl" }, job.salary),
                            React.createElement('div', { className: "mt-6 flex flex-col items-center gap-2 text-gray-500 font-medium" },
                                React.createElement('div', { className: "flex items-center gap-1" }, `🏢 ${job.employer}`),
                                React.createElement('div', { className: "flex items-center gap-1" }, `📍 ${job.dist}`)
                            )
                        );
                    })
                ),

                // Controls
                React.createElement('div', { className: "pb-12 px-10 flex justify-between items-center z-20" },
                    React.createElement('button', { 
                        onClick: () => handleSwipe('left'),
                        className: "w-20 h-20 rounded-full bg-white shadow-xl flex items-center justify-center text-4xl text-red-500 active:scale-90 transition-transform"
                    }, '✕'),
                    React.createElement('button', { 
                        onClick: () => handleSwipe('right'),
                        className: "w-20 h-20 rounded-full bg-white shadow-xl flex items-center justify-center text-4xl text-emerald-500 active:scale-90 transition-transform"
                    }, '✓')
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
