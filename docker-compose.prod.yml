version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: blackwork
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-password}@db:5432/blackwork
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
    depends_on:
      - db
      - redis

  webapp:
    build: ./webapp
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
